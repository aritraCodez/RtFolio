<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <!-- Definitions for Gradients, Clips, and Filters -->
  <defs>
    <linearGradient id="gold-foil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="40%" stop-color="#FFA751" />
      <stop offset="70%" stop-color="#FFE259" />
      <stop offset="100%" stop-color="#C59B27" />
    </linearGradient>
    
    <linearGradient id="sienna-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4844F" />
      <stop offset="100%" stop-color="#A0522D" />
    </linearGradient>

    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3C72" />
      <stop offset="100%" stop-color="#0F2B5C" />
    </linearGradient>

    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="46" />
    </clipPath>

    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- External Border Circle (Styled like an art frame) -->
  <circle cx="50" cy="50" r="47" stroke="#D9CFC3" stroke-width="2" fill="none" />

  <!-- Main Canvas Clipped Area -->
  <g clip-path="url(#circle-clip)">
    <!-- LEFT SIDE: Warm Abstract Grid (Parchment & Sienna & Charcoal) -->
    <rect x="0" y="0" width="50" height="100" fill="#FAF7F2" />
    
    <!-- Sienna Block -->
    <rect x="12" y="14" width="22" height="24" rx="2" fill="url(#sienna-grad)" />
    
    <!-- Charcoal Block -->
    <rect x="22" y="52" width="20" height="32" rx="2" fill="#1C1917" />
    
    <!-- Fine Horizontal Texture Lines on Left -->
    <line x1="4" y1="20" x2="46" y2="20" stroke="#D9CFC3" stroke-width="0.75" stroke-dasharray="2, 2" />
    <line x1="4" y1="30" x2="46" y2="30" stroke="#D9CFC3" stroke-width="0.75" />
    <line x1="4" y1="40" x2="46" y2="40" stroke="#D9CFC3" stroke-width="0.75" />
    <line x1="4" y1="60" x2="22" y2="60" stroke="#D9CFC3" stroke-width="0.75" />
    <line x1="4" y1="70" x2="22" y2="70" stroke="#D9CFC3" stroke-width="0.75" stroke-dasharray="3, 1" />
    
    <!-- Gold Foil Half Arc -->
    <path d="M12,52 A 16,16 0 0,1 36,52" fill="none" stroke="url(#gold-foil)" stroke-width="3" stroke-linecap="round" />

    <!-- RIGHT SIDE: Deep Indigo Canvas with Gold Blocks -->
    <rect x="50" y="0" width="50" height="100" fill="url(#blue-grad)" />
    
    <!-- Darker Blue Semicircle overlay for depth -->
    <path d="M50,4 A 46,46 0 0,1 96,50 A 46,46 0 0,1 50,96 Z" fill="#0B1A3A" opacity="0.4" />
    
    <!-- Gold Foil Blocks (grid pattern) on the blue side -->
    <!-- Grid of 2x5 gold leaf rectangles -->
    <g filter="url(#subtle-shadow)">
      <!-- Row 1 -->
      <rect x="62" y="24" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      <rect x="74" y="24" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      
      <!-- Row 2 -->
      <rect x="62" y="36" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      <rect x="74" y="36" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      
      <!-- Row 3 -->
      <rect x="62" y="48" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      <rect x="74" y="48" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      
      <!-- Row 4 -->
      <rect x="62" y="60" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      <rect x="74" y="60" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />

      <!-- Row 5 -->
      <rect x="62" y="72" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
      <rect x="74" y="72" width="7" height="5" rx="0.5" fill="url(#gold-foil)" />
    </g>

    <!-- Dividing / Joining Line -->
    <line x1="50" y1="4" x2="50" y2="96" stroke="#FAF7F2" stroke-width="1.5" opacity="0.8" />
  </g>
</svg>